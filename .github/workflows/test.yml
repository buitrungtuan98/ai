name: tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ffmpeg lets the render integration test run (it self-skips when absent).
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        # conftest.py generates a throwaway FERNET_KEY and points the DB at a temp file,
        # so the suite runs with no real secrets or external services.
        run: pytest -q
