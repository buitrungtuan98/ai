name: deploy

# Continuous deployment to the Oracle VPS. Triggers when code lands on `main`
# (merge the feature branch to release), plus a manual button. Uses raw ssh with
# host-key pinning — no third-party action. Every credential comes from repo
# Secrets; the VPS keeps its own .env (never transmitted here). See docs/RUNBOOK.md
# for the required secrets and one-time VPS bootstrap.

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      ssh_port:
        description: "Override SSH port for this run (optional; else uses the SSH_PORT variable/secret)"
        required: false

# Port resolution order (easy to change without editing this file):
#   1. manual-run input  2. repo Variable SSH_PORT  3. Secret SSH_PORT  4. default 22
# Change the port anytime in Settings → Secrets and variables → Actions → Variables (SSH_PORT).

concurrency:
  group: deploy-production
  cancel-in-progress: false        # never interrupt an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH (key + host-key pinning)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          INPUT_PORT: ${{ github.event.inputs.ssh_port }}
          VAR_PORT: ${{ vars.SSH_PORT }}
          SECRET_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY" || { echo "::error::SSH_PRIVATE_KEY secret is not set"; exit 1; }
          test -n "$SSH_HOST" || { echo "::error::SSH_HOST secret is not set"; exit 1; }
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          port="${INPUT_PORT:-${VAR_PORT:-${SECRET_PORT:-22}}}"   # input > variable > secret > 22
          echo "Using SSH port: $port"
          if [ -n "$SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts       # pinned (recommended)
          else
            echo "::warning::SSH_KNOWN_HOSTS not set — using ssh-keyscan (trust-on-first-use)."
            ssh-keyscan -p "$port" -H "$SSH_HOST" > ~/.ssh/known_hosts 2>/dev/null || true
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          INPUT_PORT: ${{ github.event.inputs.ssh_port }}
          VAR_PORT: ${{ vars.SSH_PORT }}
          SECRET_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          port="${INPUT_PORT:-${VAR_PORT:-${SECRET_PORT:-22}}}"   # input > variable > secret > 22
          user="${SSH_USER:-ubuntu}"
          path="${DEPLOY_PATH:-ai}"          # relative to the SSH home dir, or an absolute path
          branch="main"
          echo "Deploying '$branch' to ${user}@${SSH_HOST}:${port} (${path})"
          # One remote command string: update git to the target branch, then run the deploy script.
          remote="cd \"$path\" && git fetch --all --prune && git checkout \"$branch\" && git reset --hard \"origin/$branch\" && bash scripts/deploy.sh"
          ssh -i ~/.ssh/id_deploy -p "$port" -o IdentitiesOnly=yes -o BatchMode=yes \
            "${user}@${SSH_HOST}" "$remote"
